<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Self-Chat - צ'אט עם עצמי</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div id="loading" class="loading" style="display: none;">
        <div class="loading-spinner"></div>
        <div class="loading-text" id="loadingText">טוען...</div>
    </div>

    <!-- מסך הזנת מפתח API -->
    <div id="apiSetup" class="container">
        <div class="setup-card">
            <div class="setup-header">
                <i class="fas fa-key"></i>
                <h1>הגדרת Gemini API</h1>
                <p>הכנס את מפתח ה-API שלך כדי להתחיל</p>
            </div>
            <form id="apiForm">
                <div class="input-group">
                    <label for="apiKey">מפתח API של Gemini:</label>
                    <input type="password" id="apiKey" placeholder="הכנס את מפתח ה-API שלך..." required>
                    <button type="button" id="toggleApiKey" class="toggle-password">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <div id="apiErrorMsg" class="error-message" style="display: none; color: red; margin-top: 10px; text-align: center;"></div>
                <button type="submit" id="submitApiBtn" class="btn btn-primary" style="margin-top: 20px; width: 100%;">
                    <i class="fas fa-save"></i>
                    שמור מפתח והמשך
                </button>
            </form>
        </div>
    </div>

    <!-- האפליקציה המרכזית -->
    <div id="mainApp" class="container" style="display: none;">
        <header class="app-header">
            <div class="header-content">
                <h1><i class="fas fa-robot"></i> זירת הבוטים של Gemini</h1>
                <div class="header-actions">
                    <button id="settingsBtn" class="btn btn-secondary" title="הגדרות">
                        <i class="fas fa-cog"></i> הגדרות
                    </button>
                    <button id="newChatBtn" class="btn btn-primary" title="שיחה חדשה">
                        <i class="fas fa-plus"></i> שיחה חדשה
                    </button>
                </div>
            </div>
        </header>

        <div class="main-content">
            <!-- אזור ההגדרות והתחלת השיחה -->
            <div id="chatSetupArea" class="setup-card" style="margin-top: 20px;">
                <h2>הגדרת שיחה חדשה</h2>
                
                <div class="settings-grid">
                    <div class="input-group">
                        <label>נושא השיחה:</label>
                        <input type="text" id="chatTopic" placeholder="על מה הבוטים ידברו? (למשל: יתרונות הבינה המלאכותית)" required>
                    </div>

                    <div class="input-group">
                        <label>מודל שואל (מראיין):</label>
                        <select id="askerModelSelect">
                            <option value="gemini-1.5-flash">Gemini 1.5 Flash (מהיר)</option>
                            <option value="gemini-1.5-pro">Gemini 1.5 Pro (חכם)</option>
                            <option value="gemini-2.5-flash">Gemini 2.5 Flash (החדש)</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label>מודל עונה (מרואיין):</label>
                        <select id="answererModelSelect">
                            <option value="gemini-1.5-pro">Gemini 1.5 Pro (חכם)</option>
                            <option value="gemini-1.5-flash">Gemini 1.5 Flash (מהיר)</option>
                            <option value="gemini-2.5-flash">Gemini 2.5 Flash (החדש)</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label>סגנון ניהול שיחה:</label>
                        <select id="chatModeSelect">
                            <option value="fixed">מספר סיבובים מוגדר מראש</option>
                            <option value="infinite">שיחה ללא הגבלה (עד לעצירה ידנית)</option>
                        </select>
                    </div>

                    <div class="input-group" id="roundsInputGroup">
                        <label>מספר סיבובים (שאלה + תשובה):</label>
                        <input type="number" id="roundsCount" value="5" min="1" max="50">
                        <div class="token-estimation">
                            <i class="fas fa-coins"></i> צפי עלות שיחה: <span id="tokenEstimate">1250</span> טוקנים משוערים.
                        </div>
                    </div>
                </div>

                <button id="startChatBtn" class="btn btn-primary btn-large" style="width: 100%; margin-top: 20px;">
                    <i class="fas fa-play"></i> התחל שיחה בין המודלים
                </button>
            </div>

            <!-- אזור הצ'אט הפעיל -->
            <div id="chatContainer" class="chat-container" style="display: none;">
                <div class="chat-header">
                    <h2 id="chatTitle">נושא השיחה</h2>
                    <div class="chat-controls">
                        <span id="roundCounter" class="badge">סיבוב 1</span>
                        <span id="chatStatus" class="status-badge running"><i class="fas fa-spinner fa-spin"></i> פעיל</span>
                        <button id="stopChatBtn" class="btn btn-danger btn-sm">
                            <i class="fas fa-stop"></i> עצור שיחה
                        </button>
                    </div>
                </div>

                <div id="chatMessages" class="chat-messages">
                    <!-- הודעות יתווספו לכאן דינמית -->
                </div>

                <div class="chat-footer">
                    <button id="exportTextBtn" class="btn btn-secondary">
                        <i class="fas fa-file-alt"></i> ייצא טקסט
                    </button>
                    <button id="generatePodcastBtn" class="btn btn-podcast" style="display: none;">
                        <i class="fas fa-podcast"></i> הפוך לפודקאסט קולי
                    </button>
                </div>

                <!-- נגן הפודקאסט (מוסתר בהתחלה) -->
                <div id="podcastPlayerContainer" class="podcast-player" style="display: none;">
                    <h3><i class="fas fa-headphones"></i> הפודקאסט מוכן!</h3>
                    <audio id="podcastAudio" controls style="width: 100%; margin-top: 10px;"></audio>
                    <a id="downloadPodcastBtn" class="btn btn-primary" style="margin-top: 10px; display: inline-block; text-decoration: none;">
                        <i class="fas fa-download"></i> הורד קובץ שמע
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- מודל הגדרות מערכת -->
    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-cog"></i> הגדרות מערכת מתקדמות</h3>
                <button id="closeSettingsModal" class="btn-close">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="input-group">
                    <label for="newApiKey">עדכן מפתח API:</label>
                    <input type="password" id="newApiKey" placeholder="מפתח API חדש...">
                    <button type="button" id="toggleNewApiKey" class="toggle-password">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <div class="input-group">
                    <button id="clearHistory" class="btn btn-danger" style="width: 100%;">
                        <i class="fas fa-trash"></i>
                        מחק מפתח API ואפס מערכת
                    </button>
                </div>
            </div>
            <div class="modal-footer">
                <button id="saveSettingsBtn" class="btn btn-primary">
                    <i class="fas fa-save"></i>
                    שמור הגדרות
                </button>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
